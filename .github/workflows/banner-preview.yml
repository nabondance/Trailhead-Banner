---
name: Banner Preview

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  banner-preview:
    name: Banner Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.js', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build

      - name: Start server
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          thb_KV_REST_API_URL: ${{ secrets.THB_KV_REST_API_URL }}
          thb_KV_REST_API_TOKEN: ${{ secrets.THB_KV_REST_API_TOKEN }}
        run: |
          pnpm start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:3000/api/validate-username?username=test" > /dev/null 2>&1; then
              echo "Server is ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start after 60 seconds"
              exit 1
            fi
            sleep 2
          done

      - name: Generate and upload banners
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: node .github/scripts/banner-preview/generate-and-upload.mjs

      - name: Post PR comment
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHORT_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/banner-preview/post-comment.mjs

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" || true
          fi
