# Grype configuration for MegaLinter.
#
# MegaLinter uses this repo-level file in place of its bundled default
# (TEMPLATES/.grype.yaml). The settings below mirror that default, plus
# documented ignore rules for advisories with no runtime impact.
#
# Policy:
#   - Dependencies present in the PRODUCTION tree (verified with
#     `pnpm why --prod <pkg>`) are remediated for real by pinning them to a
#     patched version in package.json > pnpm.overrides (currently: undici,
#     postcss).
#   - Advisories in build/lint-time-only transitive deps (absent from the
#     production tree, so not shipped or executed by the deployed app) are
#     ignored here by their advisory ID, with the affected package noted.
#     Each entry should be re-evaluated if the package ever enters the
#     runtime dependency tree.

# Fail on findings at or above this severity (mirrors MegaLinter default).
fail-on-severity: 'high'

ignore:
  # Disputed/unwarranted — preserved from the MegaLinter default template.
  - vulnerability: CVE-2018-20225

  # --- Build/lint-time-only transitive deps (no runtime impact) ---
  # Verified absent from the production tree via `pnpm why --prod`. These run
  # only during CI/build, never in the deployed app, so ALL advisories on them
  # are ignored (not just the currently-known ones) to avoid recurring upkeep.
  # Re-evaluate a package here if it ever enters the runtime dependency tree.
  - package:
      name: fast-uri # via ajv → JSON-schema/lint tooling
  - package:
      name: js-yaml # build/lint tooling
  - package:
      name: brace-expansion # glob/minimatch in tooling
  - package:
      name: '@babel/core' # build-time transpilation
